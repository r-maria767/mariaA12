<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
</head>
<body>
    <div class="container">
  <h1>User Registration Form</h1>

    <form>
        <fieldset>
            <legend>Personal Information </legend>
        <table>
            <tr>
                <td><label for="First Name">First Name*</label></td>
                <td>
                    <input type="text" id="FirstName" name="PatientName"
                           placeholder="Enter Your Name" required>
                </td>
            </tr>
            <tr>
                <td><label for="Last Name">Last Name*</label></td>
                <td>
                    <input type="text" id="LastName" name="LastName"
                           placeholder="Enter Your Name" required>
                </td>
            </tr>
            <tr>
                <td><label for="DOB">Date Of Birth*</label></td>
                <td>
                    <input type="date" id="DOB" name="DOB">
                </td>
            </tr>
            <tr>
                <td>Patient Gender*</td>
                <td>
                    <input type="radio" id="Male" name="Gender" value="Male">
                    <label for="Male">Male</label>
                    <input type="radio" id="Female" name="Gender" value="Female">
                    <label for="Female">Female</label>
                    <input type="radio" id="Female" name="Gender" value="Others">
                    <label for="Others">Others</label>
                </td>
            </tr>

            <tr>
                <td><label for="PatientFile">Patient Prescription:</label></td>
                <td>
                    <input type="file" id="PatientFile" name="PatientFile">
                </td>
            </tr>

        </table>
        </fieldset>
        <fieldset>
            <legend> Contact Information </legend>
            <table>
                <tr> 
                <td> <label for="Email Address"> Email Address* </label> </td>
                <td> <input type="text" id="Email Address" name="Email Address"> </td>
                </tr>
                <tr>
                    <td> <label for="Phone Number"> Phone Number* </label> </td>
                    <td> <input type="Phone Number" id="Phone Number" name="Phone Number"> </td>
                </tr>
                <tr>
                <td><label for="Address">Address*</label></td>
                <td>
                    <textarea id="Address" name="Address" rows="5" cols="20" Style= "resize:none" placeholder="Enter your full address"></textarea>
                </td>
            </tr>
            <tr>
                <td> <label for= "country"> Country*  </label></td>
                <td>
                    <select id="country"> 
                    <option id ="Default" value="Default">-Select Country-</option>
                    <option id ="BD" value="Bangladesh">BANGLADESH</option>
                    <option id ="Canada" value="Canada"> CANADA </option>
                    <option id ="Australia" value="AUSTRALIA"> AUSTRALIA </option>
                    <option id ="Argtentina" value="ARGENTINA"> ARGENTINA </option>
                    </select>
                </td>
            </tr>

                
            </table>
        </fieldset>

        <fieldset>
            <legend> Account Information </legend>
            <table>
                <tr> 
                <td> <label for="username"> User Name* </label> </td>
                <td> <input type="text" id="username" name="username"> </td>
                </tr>
                <tr>
                    <td> <label for="password"> Password* </label> </td>
                    <td> <input type="password" id="password" name="password"> </td>
                </tr>

                <tr>
                    <td> <label for="Conpassword">Confirm  Password* </label> </td>
                    <td> <input type="Conpassword" id="Conpassword" name="Conpassword"> </td>
                </tr>
            </table>
        </fieldset>
        <fieldset>
            <legend> Preferences </legend>
            <table>
                <tr> 
                <td> <label for="Interests"> Interests </label> </td>
                <td>
                    <input type ="checkbox" id="Sports" name="Interests">
                    <label for ="Sports">Sports </label>
                    <br>
                    <input type ="checkbox" id="Music" name="Interests">
                    <label for ="Music">Music </label>
                    <br>
                    <input type ="checkbox" id="Reading" name="Interests">
                    <label for ="Reading"> Reading </label>
                    <br>
                    <input type ="checkbox" id="Technology" name="Interests">
                    <label for ="Technology"> Technology</label>

                </td>
                </tr>
                
                
            </table>
            <input type="checkbox" id="Condition" name="Condition">
        <label for="Condition"> <font color= "black"> I Agree  To The Terms and Conditions * </font></label>
        </fieldset>
       
        <br>
        <input type="Register" id="Register" name="Register" value="Register">
        <input type="Clear Form" id="Clear Form" name="Clear Form" value="Clear Form">
        
            
        
    </form>
</div>
</body>
</html>
